<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }
        #formContainer{
            background-color: white;
            margin: 0 auto;
            max-width: 400px;
            height: 600px;
            border: solid #1a3474 10px;
            border-radius: 20px;
        }
        #header {
           width: 100%;
           height: 170px;
           display: grid;
           grid-template-rows: 2fr 1fr 1fr 1fr;
           grid-template-columns: 1fr;
           overflow: hidden;
           justify-items: center;
        }
        #header img {
            width: 100%;
            grid-row: 1/5;
            grid-column: 1/2;
        }
        #header h1 {
            color: white;
            text-shadow: 2px 2px 4px black;
            grid-row: 2/3;
            grid-column: 1/2;
        }
        #header h2 {
            color: white;
            text-shadow: 2px 2px 4px black;
            grid-row: 3/4;
            grid-column: 1/2;
        }
        #closeBtn {
            position: absolute;
            top: 10px;
            width: 20px;
            margin: 10px;
        }
        h3 {
           text-align: center; 
           margin: 20px;
        }
        #myForm {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1em;
            padding: 1em;
        }
        #myForm section {
            grid-column: 1/3;
            text-align: center;
        }
        #book {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            gap: 4px;
        }
        img {
            max-width: 100%;
        }
    </style>




</head>

<body>
    <div id="formContainer">
        <div id="header">
            <img src="images/jesus_feeds_5000.jpeg" alt="">
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <button type="button" id="closeBtn">X</button>
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>
        <div id="book">
            <img src="images/old_testament.webp" alt="">
            <img src="images/new_testament.webp" alt="">
            <img src="images/book_of_mormon.webp" alt="">
            <img src="images/doctrine_and_covenants.webp" alt="">
            <img src="images/pearl_of_great_price.webp" alt="">
        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
